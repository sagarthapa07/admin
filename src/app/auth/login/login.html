<header>
  <div>
    <nav class="navbar navbar-light bg-primary px-3">
      <!-- Left: Logo -->
      <img src="assets/images/logos/logo.png" alt="Logo" height="40" class="navbar-brand" />

      <!-- Right: Icon button -->
      <button class="btn btn-outline-light">
        <i class="bi bi-moon-fill"></i>
      </button>
    </nav>
  </div>
</header>
<section class="login-bg">
  <div class="Login d-flex justify-content-center align-items-center">
    <div class="row">
      <div class="col-md-12 col-sm-12">
        <div class="d-flex justify-content-center align-items-center rounded-4 mx-0 px-0">
          <div
            class="py-2 rounded-3"
            style="
              background-color: #ffffff;
              box-shadow: 0 2px 6px rgba(174, 174, 174, 0.285);
              z-index: 1;
            "
          >
            <div class="mt-5">
              <h3 class="text-center fs-7 fw-semibold" style="font-size: 20px">
                Login to your account
              </h3>
              <h6
                class="text-center fw-lighter"
                style="color: rgba(8, 8, 8, 0.695); font-size: 13px"
              >
                Your Credentials
              </h6>
            </div>
            <form autocomplete="off" novalidate class="m-1 d-flex flex-column align-items-center">
              <div class="py-2 mx-2">
                <label for="email" class="py-2" style="font-size: 13px; font-weight: 600px"
                  >Email Adress:</label
                >
                <input
                  type="email"
                  id="email"
                  class="form-control"
                  name="email"
                  placeholder="Enter Email"
                  style="width: 360px; height: 30px; font-size: 13px; font-weight: 400px"
                  formControlName="email"
                />
              </div>
              <div class="mx-2">
                <label for="name" class="py-2" style="font-size: 13px; font-weight: 600px"
                  >Password:</label
                >
                <input
                  type="password"
                  id="Password"
                  class="form-control"
                  name="Password"
                  placeholder="Enter Password"
                  style="width: 360px; height: 30px; font-size: 13px; font-weight: 400px"
                  formControlName="password"
                />
              </div>
              <div style="color: #ad1a1a; font-size: larger">message</div>
              <div class="mt-4 mx-2 z-1">
                <button
                  class="btn fw-semibold d-flex align-items-center justify-content-center mb-4"
                  type="submit"
                  style="
                    width: 360px;
                    height: 30px;
                    color: rgb(252, 252, 252);
                    background-color: rgba(14, 14, 14, 0.749);
                    border: 1.5px solid rgba(0, 0, 0, 0.926);
                  "
                >
                  Login
                  <img
                    src="https://img.icons8.com/?size=15&id=100698&format=png&color=FFFFFF"
                    alt=""
                    class="d-flex mx-1 pt-1"
                  />
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
