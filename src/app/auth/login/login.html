<section class="login-bg">
  <nav class="navbar px-3">
    <img src="../../../assets/logo (3).png" alt="Logo" height="40" class="navbar-brand" />
  </nav>

  <div class="Login d-flex justify-content-center align-items-center">
    <div class="row">
      <div class="col-md-12 col-sm-12">
        <div class="d-flex justify-content-center align-items-center rounded-4 mx-0 px-0">
          <div class="card rounded-3">
            <div class="d-flex align-items-center justify-content-center">
              <img src="../../../assets/logo-icon1.png" alt="" />
            </div>

            <div class="mt-3 text-center">
              <h3 class="login-title">Login to your account</h3>
              <h6 class="login-subtitle">Your Credentials</h6>
            </div>

            <form
              [formGroup]="loginForm"
              (ngSubmit)="onSubmit()"
              autocomplete="off"
              novalidate
              class="form d-flex flex-column align-items-center"
            >
              <div class="form-group">
                <label for="name">User Name:</label>
                <input
                  type="text"
                  id="name"
                  class="form-control"
                  placeholder="Enter Name"
                  formControlName="name"
                />
              </div>

              <div class="form-group">
                <label for="password">Password:</label>
                <input
                  type="password"
                  id="password"
                  class="form-control"
                  placeholder="Enter Password"
                  formControlName="password"
                />
              </div>

              <div class="mt-4">
                <button class="btn login-btn" type="submit">Login</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
