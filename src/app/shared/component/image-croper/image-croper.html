<div class=" mb-3">
    <label for={{label}} class="form-label">{{label}}</label>
    <div class="input-group">
        <input id="{{label}}" type="file"  class="form-control"  (change)="fileChangeHandler($event)"  accept=".jpeg, .jpg, .png" />
        {{output?.base64}}
            <img [src]="output?.base64" (click)="showFullImg()" class="mx-2" style="height: 40px;"
                [style.border]="output?.base64 ? '1px solid #dee2e6' : 'none'"  />



    </div>
</div>

<ng-template #imageView let-c="close" let-d="dismiss">
    <div class="modal-content imageView ">
        <div class="modal-header">
            <h4 class="modal-title ms-3">Current Image </h4>
            <button type="button" class="close_btn" (click)="close()" aria-label="Close">
                <i class="fa fa-times"></i>
            </button>
        </div>
        <div class="modal-body text-center" >

            <img class="img-fluid" [src]="output?.base64 ?  output?.base64 : this.imageLink"  [style.border]="output?.base64 ? '1px solid #dee2e6' : 'none'"   alt="">

        </div>
    </div>

</ng-template>
