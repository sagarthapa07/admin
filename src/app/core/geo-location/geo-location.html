<app-header></app-header>
<section class="header-section">
  <div class="row mt-4">
    <div class="col-6">
      <h5>Select Geo Location</h5>
    </div>
    <div class="col-6 d-flex justify-content-end">
      <button class="btn border" (click)="openPasteModal()">Paste Here</button>
    </div>
    <div class="paste-overlay" *ngIf="showPasteModal">
      <div class="paste-modal" (click)="$event.stopPropagation()">
        <h3>Paste Article / Content</h3>
        <textarea
          [(ngModel)]="pasteText"
          placeholder="Paste your article or long text here..."
        ></textarea>
        <div class="paste-actions">
          <button class="btn-remove" (click)="closePasteModal()">Cancel</button>
          <button class="btn-done" (click)="generateFromText()">Generate</button>
        </div>
      </div>
    </div>
  </div>
  <hr />

  <div class="row mt-5">
    <div class="col-12 col-md-6 col-lg-3 mb-4" *ngFor="let key of geoKeys">
      <!-- HEADER -->
      <div class="d-flex justify-content-between align-items-center">
        <span class="geo-label">
          {{ geoDropdowns[key].label }}
        </span>
        <span
          class="add-more fw-semibold"
          *ngIf="shouldShowAdd(key)"
          (click)="openGeoModal(key)"
          style="cursor: pointer"
        >
          Add [+]
        </span>
      </div>

      <!-- DROPDOWN -->
      <ng-container *ngIf="geoDropdowns[key].data?.length">
        <ng-multiselect-dropdown
          [placeholder]="'Select...'"
          [settings]="multiSelectSettings"
          [data]="geoDropdowns[key].data"
          [(ngModel)]="geoDropdowns[key].selected"
          [ngModelOptions]="{ standalone: true }"
          [name]="key"
        >
        </ng-multiselect-dropdown>
      </ng-container>

      <!-- SELECTED CHIPS (IMPORTANT: INSIDE SAME COL) -->
      <div class="mt-3" *ngIf="geoDropdowns[key].selected?.length">
        <span class="chip" *ngFor="let item of geoDropdowns[key].selected">
          {{ item.item_text }}
          <span class="remove" (click)="removeGeoItem(key, item)"> × </span>
        </span>
      </div>
    </div>
  </div>

  <!-- COMMON GEO MODAL -->
  <div class="custom-overlay" *ngIf="showGeoModal" (click)="closeGeoModal()">
    <div class="custom-modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h5>Add {{ geoModalType === 'cities' ? 'City' : 'Township' }}</h5>
        <span class="close-btn" (click)="closeGeoModal()">✕</span>
      </div>

      <div class="modal-body">
        <input
          type="text"
          class="form-control"
          [placeholder]="geoModalType === 'cities' ? 'City' : 'Township'"
          [(ngModel)]="newGeoName"
        />
      </div>
      <div class="modal-footer gap-2">
        <button class="btn btn-save" (click)="closeGeoModal()">Close</button>
        <button class="btn btn-save" (click)="saveGeoItem()">Save</button>
      </div>
    </div>
  </div>

  <!-- FOOTER BUTTONS -->
  <div class="buttons d-flex justify-content-between">
    <div>
      <button type="button" class="btn btn-next" (click)="clearAll()">Clear all</button>
    </div>
    <div>
      <button type="button" class="btn btn-save mx-2" (click)="saveAll()">
        <i class="bi bi-bookmark-check"></i> Save
      </button>
      <button type="button" class="btn btn-next mx-2" (click)="goToCalenderArea()">
        <i class="bi bi-skip-backward"></i> Back
      </button>
      <button type="button" class="btn btn-next" (click)="goToFocusAreas()">
        Next <i class="bi bi-skip-forward"></i>
      </button>
    </div>
  </div>
</section>
