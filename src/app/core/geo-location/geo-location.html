<div class="row mt-4">
  <div class="col-6">
    <h5>Select Geo Location</h5>
  </div>

  <div class="col-6 d-flex justify-content-end">
    <button class="btn border" (click)="openPasteModal()">Paste Here</button>
  </div>
</div>

<hr />

<div class="row mt-5">
  <div class="col-12 col-md-6 col-lg-3 mb-4" *ngFor="let key of geoKeys">
    <div class="d-flex justify-content-between align-items-center">
      <span class="geo-label">
        {{ geoDropdowns[key].label }}
      </span>

      <span
        class="add-more fw-semibold"
        *ngIf="shouldShowAdd(key)"
        (click)="openGeoModal(key)"
        style="cursor: pointer"
      >
        Add [+]
      </span>
    </div>

    <ng-multiselect-dropdown
      [placeholder]="'Select...'"
      [settings]="multiSelectSettings"
      [data]="geoDropdowns[key].data"
      [(ngModel)]="geoDropdowns[key].selected"
      [name]="key"
    >
    </ng-multiselect-dropdown>

    <button class="btn btn-save float-end mt-2" (click)="saveGeo(key)">Save</button>

    <div class="mt-3" *ngIf="geoDropdowns[key].selected?.length">
      <span class="chip" *ngFor="let item of geoDropdowns[key].selected">
        {{ item.item_text }}

        <span class="remove" (click)="removeGeoItem(key, item)"> × </span>
      </span>
    </div>
  </div>
</div>
