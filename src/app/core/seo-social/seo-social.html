<form [formGroup]="seoForm" class="mt-5">
  <div class="row">
    <!-- LEFT SIDE SEO -->

    <div class="col-md-6">
      <h5 class="section-title">SEO DETAILS</h5>

      <hr />

      <div class="form-group">
        <label>Friendly URL:</label>

        <input
          type="url"
          class="form-control"
          formControlName="friendlyUrl"
          placeholder="Friendly URL"
        />
      </div>

      <div class="form-group">
        <label>Meta Title:</label>

        <input
          type="text"
          class="form-control"
          formControlName="metaTitle"
          placeholder="Meta Title"
        />
      </div>

      <div class="form-group">
        <label>Meta Author:</label>

        <input
          type="text"
          class="form-control"
          formControlName="metaAuthor"
          placeholder="Meta Author"
        />
      </div>

      <div class="form-group">
        <label>Meta Keywords:</label>

        <input
          type="text"
          class="form-control"
          formControlName="metaKeywords"
          placeholder="Meta Keywords"
        />
      </div>

      <div class="form-group">
        <label>Meta Description:</label>

        <textarea
          rows="3"
          class="form-control"
          formControlName="metaDescription"
          placeholder="Meta Description"
        ></textarea>
      </div>
    </div>

    <!-- RIGHT SIDE SOCIAL -->

    <div class="col-md-6">
      <h5 class="section-title">SOCIAL REFERENCES</h5>

      <hr />

      <div class="form-group">
        <label>Facebook Handler:</label>

        <input
          type="text"
          class="form-control"
          formControlName="facebookHandler"
          placeholder="Facebook Handler"
        />
      </div>

      <div class="form-group">
        <label>Twitter Handler:</label>

        <input
          type="text"
          class="form-control"
          formControlName="twitterHandler"
          placeholder="Twitter Handler"
        />
      </div>

      <div class="form-group">
        <label>Google Plus Handler:</label>

        <input
          type="text"
          class="form-control"
          formControlName="googleHandler"
          placeholder="Google Plus Handler"
        />
      </div>

      <div class="form-group">
        <label>Instagram Handler:</label>

        <input
          type="text"
          class="form-control"
          formControlName="instagramHandler"
          placeholder="Instagram Handler"
        />
      </div>
    </div>
  </div>

  <!-- BUTTONS -->

  <div class="buttons d-flex justify-content-between">
    <div>
      <button type="button" class="btn btn-save" (click)="createByAI()">Create By AI</button>
    </div>

    <div>
      <button type="button" class="btn btn-save mx-2" (click)="saveSEO()">Save</button>
    </div>
  </div>
</form>
