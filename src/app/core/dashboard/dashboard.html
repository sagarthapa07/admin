<app-header></app-header>
<section class="header-section">
  <div class="heading">
    <span >You Are in Dashboard section</span>
  </div>
  <div class="content">
    <form class="row row-cols-sm-auto m-0">
      <div class="col-12">
        <div class="input-group">
          <input
            class="form-control"
            placeholder="yyyy-mm-dd"
            name="dp"
            [(ngModel)]="model"
            ngbDatepicker
            #d="ngbDatepicker"
          />
          <button
            class="btn btn-outline-secondary bi bi-calendar3"
            (click)="d.toggle()"
            type="button"
          ></button>
        </div>
      </div>
    </form>

    <!-- <img class="logo big-logo" src="../../../assets/logo (2).png" alt="big logo" /> -->
  </div>
</section>
